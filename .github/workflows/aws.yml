# This workflow will build and push a new container image to Amazon ECR, and then will deploy a new task definition to Amazon ECS, when there is a push to the "main" branch.

name: Deploy to AWS ECS

on:
    push:
        branches:
            - main
        paths-ignore:
            - README.md

jobs:
    integration:
        name: Continuous Integration
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3

          - name: Lint code
            run: echo "Linting repository"

    build-and-push-ecr-image:
        name: Continuous Delivery
        needs: integration
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3

          - name: Install utilities
            run: |
                sudo apt-get update
                sudo apt-get install -y jq unzip

          - name: Configure AWS credentials
            id: configure-ecr
            uses: aws-actions/configure-aws-credentials@v1
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}
        
          - name: Login to AWS ECR
            id: login-ecr
            uses: aws-actions/amazon-ecr-login@v1

          - name: Build, tag and push docker image to aws ecr
            id: build-image
            env:
              ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
              ECR_REPOSITORY: ${{secrets.ECR_REPOSITORY_NAME }}
              IMAGE_TAG: latest
            run: 
              # build docker image first and push it to ecr (elastic container registery).
              # tHEN from ECR it can be deployed to Elastic compute 
              |
              docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
              docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
              echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

    deploy-image-to-ec2:
        name: Continuous Deployment
        needs: build-and-push-ecr-image
        runs-on: self-hosted
        steps:
          - name: Checkout code
            uses: actions/checkout@v3

          - name: Configure AWS credentials
            uses: aws-actions/configure-aws-credentials@v1
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}
          
          # LOGIN TO AWS ECR b/c thats where the docker image is present
          - name: Login to AWS ECR
            id: login-ecr
            uses: aws-actions/amazon-ecr-login@v1

          - name: Pull latest images from ECR
            run: |
              docker pull ${{secrets.AWS_ECR_LOGIN_URI}}/${{ secrets.ECR_REPOSITORY_NAME }}:latest

          - name: Run Docker image in EC2 to serve users
            run: |
              docker run -d -p 8000:8000 --ipc="host" --name=phishingdetection -e 'AWS_ACCESS_KEY_ID'=${{secrets.AWS_ACCESS_KEY_ID}} -e 'AWS_SECRET_ACCESS_KEY'=${{secrets.AWS_SECRET_ACCESS_KEY}} -e 'AWS_REGION'=${{secrets.AWS_REGION}} ${{secrets.AWS_ECR_LOGIN_URI}}/${{secrets.ECR_REPOSITORY_NAME}}:latest

          - name: Clean previous image and containers
            run: |
              docker system prune -f

